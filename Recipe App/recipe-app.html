<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="recipe.css">
</head>
<body>

    <!-- ── AUTH PAGE ── -->
    <div id="authPage">
        <div class="auth-box">
            <p class="auth-logo">🍳 Recipio</p>
            <h1 class="auth-title">Your personal recipe vault.</h1>

            <div class="tab-switcher">
                <button class="tab-btn active" onclick="switchTab('login')">Sign In</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <div class="error-msg" id="authError"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input id="loginEmail" type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="loginPassword" type="password" placeholder="••••••••" required>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>

            <!-- Register Form (hidden by default) -->
            <form id="registerForm" style="display:none">
                <div class="form-group">
                    <label>Full Name</label>
                    <input id="regName" type="text" placeholder="Gordon Ramsay" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input id="regEmail" type="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input id="regPassword" type="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input id="regConfirmPassword" type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Create Account</button>
            </form>
        </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard">
        <div class="topbar">
            <div class="topbar-logo">Recip<span>io</span></div>
            <div class="topbar-right">
                <span id="welcomeText"></span>
                <button class="btn-logout" id="logoutBtn">Sign Out</button>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h2>My Recipes</h2>
                <p>Your personal collection of culinary creations.</p>
            </div>

            <!-- Add Recipe -->
            <div class="add-recipe-card">
                <h3>Add a New Recipe</h3>
                <form id="addRecipeForm">
                    <div class="recipe-form-grid">
                        <div class="form-group-dark">
                            <label>Title</label>
                            <input id="recipeTitle" type="text" placeholder="Spaghetti Carbonara" required>
                        </div>
                        <div class="form-group-dark">
                            <label>Cooking Time (mins)</label>
                            <input id="cookingTime" type="number" placeholder="30" required>
                        </div>
                        <div class="form-group-dark full-width">
                            <label>Ingredients</label>
                            <textarea id="ingredients" placeholder="Pasta, eggs, pancetta, parmesan..." required></textarea>
                        </div>
                        <div class="form-group-dark full-width">
                            <label>Instructions</label>
                            <textarea id="instructions" placeholder="Add each step on a new line :
1. Boil pasta...
2. Mix eggs..." required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-add">+ Add Recipe</button>
                </form>
            </div>

            <!-- Recipes List -->
            <h3 class="section-title">Your Collection</h3>
            <div id="recipesList">
                <div class="empty-state">
                    <div class="empty-icon">🍽️</div>
                    <h3>No recipes yet</h3>
                    <p>Add your first recipe above to get started!</p>
                </div>
            </div>
        </div>
    </div>

    <script src="recipe-app.js"></script>
</body>
</html>
