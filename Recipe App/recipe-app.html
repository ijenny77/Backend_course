<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe App</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #F7F3EE;
            --dark: #1C1917;
            --accent: #C84B31;
            --warm: #E8D5B7;
            --muted: #8C7B6B;
            --card: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100dvh;
            overflow: hidden;
        }
        body {
            background: var(--cream);
            color: var(--dark);
        }
        /* ── AUTH PAGE ── */
        #authPage {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--dark);
            position: relative;
            overflow: hidden;
        }
        #authPage::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,75,49,0.15) 0%, transparent 70%);
            top: -100px;
            right: -100px;
        }
        #authPage::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(232,213,183,0.08) 0%, transparent 70%);
            bottom: -50px;
            left: -50px;
        }
        .auth-box {
            background: var(--cream);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.6s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-logo {
            font-family: 'Playfair Display', serif;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .auth-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 32px;
            color: var(--dark);
        }
        .tab-switcher {
            display: flex;
            background: var(--warm);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
        }
        .tab-btn.active {
            background: var(--dark);
            color: white;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--warm);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            background: white;
            color: var(--dark);
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: var(--accent);
        }
        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-primary:hover {
            background: #A83A22;
            transform: translateY(-1px);
        }
        .error-msg {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        /* ── DASHBOARD ── */
        #dashboard { display: none; }
        .topbar {
            background: var(--dark);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: white;
            font-weight: 700;
        }
        .topbar-logo span { color: var(--accent); }
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #welcomeText {
            color: var(--warm);
            font-size: 14px;
        }
        .btn-logout {
            padding: 8px 20px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 48px 24px;
        }
        .page-header {
            margin-bottom: 40px;
        }
        .page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 900;
            color: var(--dark);
        }
        .page-header p {
            color: var(--muted);
            margin-top: 8px;
            font-size: 15px;
        }
        /* Add Recipe Card */
        .add-recipe-card {
            background: var(--dark);
            border-radius: 20px;
            padding: 36px;
            margin-bottom: 48px;
            color: white;
        }
        .add-recipe-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            margin-bottom: 24px;
            color: var(--warm);
        }
        .recipe-form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .recipe-form-grid .full-width { grid-column: 1 / -1; }
        .form-group-dark label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }
        .form-group-dark input, .form-group-dark textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: white;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group-dark textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group-dark input:focus,
        .form-group-dark textarea:focus {
            border-color: var(--accent);
        }
        .form-group-dark input::placeholder,
        .form-group-dark textarea::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .btn-add {
            padding: 12px 28px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-add:hover { background: #A83A22; transform: translateY(-1px); }
        /* Recipes Grid */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--dark);
        }
        #recipesList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }
        .recipe-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--warm);
            transition: all 0.2s;
            animation: fadeUp 0.4s ease forwards;
        }
        .recipe-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.08);
        }
        .recipe-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .recipe-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--dark);
            flex: 1;
        }
        .recipe-time {
            background: var(--warm);
            color: var(--muted);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
            margin-left: 8px;
        }
        .recipe-genre {
            font-size: 12px;
            color: var(--accent);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .recipe-section {
            margin-bottom: 10px;
        }
        .recipe-section-label {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .recipe-section-text {
            font-size: 13px;
            color: var(--dark);
            line-height: 1.5;
        }
        .recipe-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--warm);
        }
        .btn-delete {
            padding: 8px 16px;
            background: #FEE2E2;
            color: #DC2626;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-delete:hover { background: #FECACA; }
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--muted);
        }
        .empty-state h3 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--dark);
        }
        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

    </style>
</head>
<body>

    <!-- ── AUTH PAGE ── -->
    <div id="authPage">
        <div class="auth-box">
            <p class="auth-logo">🍳 Recipio</p>
            <h1 class="auth-title">Your personal recipe vault.</h1>

    <!-- ── DASHBOARD ── -->

        <div class="main-content">

            <!-- Add Recipe -->
            <div class="add-recipe-card">
                <h3>Add a New Recipe</h3>
                <form id="addRecipeForm">
                    <div class="recipe-form-grid">
                        <div class="form-group-dark">
                            <label>Title</label>
                            <input id="recipeTitle" type="text" placeholder="Spaghetti Carbonara" required>
                        </div>
                        <div class="form-group-dark">
                            <label>Cooking Time (mins)</label>
                            <input id="cookingTime" type="number" placeholder="30" required>
                        </div>
                        <div class="form-group-dark full-width">
                            <label>Ingredients</label>
                            <textarea id="ingredients" placeholder="Pasta, eggs, pancetta, parmesan..." required></textarea>
                        </div>
                        <div class="form-group-dark full-width">
                            <label>Instructions</label>
                            <textarea id="instructions" placeholder="1. Boil pasta... 2. Mix eggs..." required></textarea>
                        </div>
                    </div>
                    <button type="submit" class="btn-add">+ Add Recipe</button>
                </form>
            </div>

            <!-- Recipes List -->
            <h3 class="section-title">Your Collection</h3>
            <div id="recipesList">
                <div class="empty-state">
                    <div class="empty-icon">🍽️</div>
                    <h3>No recipes yet</h3>
                    <p>Add your first recipe above to get started!</p>
                </div>
            </div>
        </div>
    </div>

</html>
